[package]
name = "lang-agent"
version = "0.1.0"
description = "AI 语言学习 agent 桌面端"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "lang_agent_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
# macOS: 把红绿灯按钮挪进侧栏卡片内(resize 后自动复位)。
tauri-plugin-decorum = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# BYOK key 存 OS keychain(macOS Keychain),绝不明文。
# 跨平台时再加 windows-native / sync-secret-service feature。
keyring = { version = "3", features = ["apple-native"] }
# LLM HTTP:走 Rust 发请求,绕过 webview CORS;reqwest 的 bytes_stream 做真流式。
reqwest = { version = "0.12", features = ["json", "stream"] }
futures-util = "0.3"

